name: Deploy to cPanel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cPanel Git Deploy
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}        # e.g. rroc.com  (no scheme, no port)
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}        # usually 2083
          CPANEL_USER: ${{ secrets.CPANEL_USER }}        # cPanel username
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}      # cPanel API token (NOT your password)
          REPO_PATH: ${{ secrets.CPANEL_REPO_PATH }}     # absolute path to repo on server, e.g. /home/USER/repositories/RROC-Marine-Website
        run: |
          set -euo pipefail
          UA="Mozilla/5.0 (compatible; GitHubActions-cPanelDeploy/1.0)"

          echo "Pulling latest commits into cPanel repo..."
          HTTP=$(curl -sS -o /tmp/pull.out -w "%{http_code}" \
            -A "$UA" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            -H "Accept: application/json" \
            --data-urlencode "repository_root=${REPO_PATH}" \
            -G \
            "https://${CPANEL_HOST}:${CPANEL_PORT}/execute/VersionControl/update")
          echo "HTTP ${HTTP}"
          cat /tmp/pull.out; echo
          [ "${HTTP}" = "200" ] || { echo "Pull failed"; exit 1; }

          echo "Triggering .cpanel.yml deployment task..."
          HTTP=$(curl -sS -o /tmp/deploy.out -w "%{http_code}" \
            -A "$UA" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}" \
            -H "Accept: application/json" \
            --data-urlencode "repository_root=${REPO_PATH}" \
            -G \
            "https://${CPANEL_HOST}:${CPANEL_PORT}/execute/VersionControlDeployment/create")
          echo "HTTP ${HTTP}"
          cat /tmp/deploy.out; echo
          [ "${HTTP}" = "200" ] || { echo "Deploy trigger failed"; exit 1; }

          echo "Deploy queued successfully."
