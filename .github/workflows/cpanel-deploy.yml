name: Deploy to cPanel (SSH)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -e
            REPO="/home3/rrocind/repositories/RROC-Marine-Website"
            PUB="/home3/rrocind/public_html"

            echo ">> Pulling latest commits..."
            cd "$REPO"
            git fetch --all --prune
            git reset --hard origin/main

            echo ">> Copying site files to public_html..."
            mkdir -p "$PUB"
            /bin/cp -f about.html        "$PUB/"
            /bin/cp -f contact.html      "$PUB/"
            /bin/cp -f engineering.html  "$PUB/"
            /bin/cp -f index.html        "$PUB/"
            /bin/cp -f portfolio.html    "$PUB/"
            /bin/cp -f safety.html       "$PUB/"
            /bin/cp -f services.html     "$PUB/"
            /bin/cp -f team.html         "$PUB/"
            /bin/cp -f values.html       "$PUB/"
            /bin/cp -f contact_process.php "$PUB/" || true
            /bin/cp -rf image/           "$PUB/"
            /bin/cp -rf admin/           "$PUB/" || true
            chmod -R 755 "$PUB"

            echo ">> Deploy complete."
