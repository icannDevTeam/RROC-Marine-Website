<!-- Static Navigation Bar for RROC Marine Website -->
<header role="banner" id="main-header"
  class="sticky top-0 z-50 bg-[#002F6C] text-white h-20 flex items-center px-4 md:px-8 transition-all duration-200 ease-in-out">
  <div class="container mx-auto flex items-center justify-between">
    <!-- Logo/Text -->
    <div class="flex items-center gap-4 lg:mr-12">
      <a href="index.html" class="flex items-center">
        <span class="text-xl font-heading font-bold tracking-wide ml-2 whitespace-nowrap">RROC INDUSTRIAL</span>
      </a>
    </div>
    <!-- Desktop Navigation -->
    <nav aria-label="Primary" class="hidden lg:flex items-center gap-8 ml-8">
      <a href="index.html" class="nav-link text-base px-2 py-1 rounded transition hover:bg-[#A5C254] hover:text-[#002F6C]" id="nav-home">Home</a>
      <div class="relative group" id="services-menu">
        <a href="services.html" class="nav-link text-base px-2 py-1 flex items-center rounded transition hover:bg-[#A5C254] hover:text-[#002F6C]" id="nav-services">
          Services
          <svg class="ml-1 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </a>
        <!-- Dropdown -->
        <div class="absolute left-0 top-full mt-2 w-48 bg-white text-[#002F6C] rounded shadow-lg opacity-0 group-hover:opacity-100 group-hover:pointer-events-auto pointer-events-none transition duration-200 z-50">
          <ul class="py-2">
            <li><a href="services.html#marine" class="block px-4 py-2 hover:bg-[#A5C254]">Marine Warranty</a></li>
            <li><a href="services.html#surf" class="block px-4 py-2 hover:bg-[#A5C254]">SURF Installation</a></li>
            <li><a href="services.html#engineering" class="block px-4 py-2 hover:bg-[#A5C254]">Engineering</a></li>
          </ul>
        </div>
      </div>
      <a href="values.html" class="nav-link text-base px-2 py-1 rounded transition hover:bg-[#A5C254] hover:text-[#002F6C]" id="nav-values">Core Values</a>
      <a href="engineering.html" class="nav-link text-base px-2 py-1 rounded transition hover:bg-[#A5C254] hover:text-[#002F6C]" id="nav-engineering">Engineering</a>
      <a href="safety.html" class="nav-link text-base px-2 py-1 rounded transition hover:bg-[#A5C254] hover:text-[#002F6C]" id="nav-safety">Safety Rules</a>
      <a href="contact.html" class="nav-link text-base px-2 py-1 rounded transition hover:bg-[#A5C254] hover:text-[#002F6C]" id="nav-contact">Contact</a>
    </nav>
    <!-- Right Controls -->
    <div class="flex items-center lg:ml-8">
      <a href="mailto:contact@rroc.com?subject=Request%20for%20Quote" class="cta-button cta-animate bg-gold text-navy font-bold py-2 px-4 rounded-full text-base hidden lg:block shadow-lg hover:bg-[#002F6C] hover:text-white transition transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-gold ml-4" style="letter-spacing:0.5px;">Get a Quote</a>
    </div>
    <!-- Mobile Menu Button -->
    <button class="lg:hidden flex items-center px-2 py-1" id="mobile-menu-toggle" aria-label="Open Menu">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </div>
  <!-- Mobile Menu -->
  <div id="mobile-menu" class="fixed top-0 left-0 w-full h-full bg-[#002F6C] text-white z-50 flex flex-col items-center justify-center hidden">
    <button class="absolute top-6 right-6" id="mobile-menu-close" aria-label="Close Menu">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
    <nav class="flex flex-col gap-6 text-2xl mt-12">
      <a href="index.html" class="nav-link">Home</a>
      <a href="services.html" class="nav-link">Services</a>
      <a href="values.html" class="nav-link">Core Values</a>
      <a href="engineering.html" class="nav-link">Engineering</a>
      <a href="safety.html" class="nav-link">Safety Rules</a>
      <a href="contact.html" class="nav-link">Contact</a>
    </nav>
    <a href="mailto:contact@rroc.com?subject=Request%20for%20Quote" class="cta-button cta-animate bg-gold text-navy font-bold py-3 px-6 rounded-full text-xl mt-8 shadow-lg hover:bg-[#002F6C] hover:text-white transition transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-gold">Get a Quote</a>
  </div>
  <script>
    // Mobile menu toggle
    document.getElementById('mobile-menu-toggle').onclick = function() {
      document.getElementById('mobile-menu').style.display = 'flex';
    };
    document.getElementById('mobile-menu-close').onclick = function() {
      document.getElementById('mobile-menu').style.display = 'none';
    };
    // Active nav highlight
    const navLinks = ['nav-home','nav-services','nav-values','nav-engineering','nav-safety','nav-contact'];
    navLinks.forEach(id => {
      const el = document.getElementById(id);
      if (el && window.location.pathname.endsWith(el.getAttribute('href'))) {
        el.classList.add('active');
        el.style.backgroundColor = '#A5C254';
        el.style.color = '#002F6C';
      }
    });
  </script>
</header>
